name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php-checks:
    name: PHP Checks
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: velvetradio_test
          MYSQL_USER: velvetradio
          MYSQL_PASSWORD: password
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout shared packages
        uses: actions/checkout@v4
        with:
          repository: JoshuaAckerly/packages
          token: ${{ secrets.GH_PAT }}
          path: ../packages

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: mbstring, xml, curl, zip, bcmath, pdo_mysql, pdo_sqlite, redis
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Run Laravel Pint (auto-fix)
        run: vendor/bin/pint

      - name: Commit Pint fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: auto-fix code style with Laravel Pint'
          commit_options: '--no-verify'

      - name: PHP Syntax Check
        run: |
          find . -name '*.php' -not -path './vendor/*' -print0 | \
          xargs -0 -n1 php -l

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse -c phpstan.neon --memory-limit=2G --error-format=github

      - name: Copy CI environment file
        run: cp .env.ci .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Run PHPUnit tests
        run: vendor/bin/phpunit --colors=always --coverage-text

      - name: Security audit
        run: composer audit

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    needs: php-checks
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout shared packages
        uses: actions/checkout@v4
        with:
          repository: JoshuaAckerly/packages
          token: ${{ secrets.GH_PAT }}
          path: ../packages

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Format frontend code
        run: npm run format

      - name: Commit format fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'style: auto-format frontend code'
          commit_options: '--no-verify'

      - name: Run Vitest tests
        run: npm test

      - name: TypeScript type check
        run: npm run types

      - name: NPM audit
        run: npm audit --audit-level=moderate || true
